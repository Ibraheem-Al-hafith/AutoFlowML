# AutoFlowML Configuration
metadata:
  project_name: "AutoFlowML"
  version: "1.0.0"

cleaning:
  variance:
    min_threshold: 0.01  # Handles static columns (nunique=1) and low-signal features
  nan_thresholds:
    numeric: 0.5         # Drop numeric columns if > 50% missing
    categorical: 0.3     # Drop categorical columns if > 30% missing
  cardinality:
    max_unique_share: 0.9  # Drops if 90% of rows are unique

task_detection:
  cardinality_threshold: 10 # Unique values below this are "Category", above are "Text"

settings:
  cv_folds: 5
  random_state: 42
model_selection:
  scoring_metric: "f1_weighted"
  use_fine_tuning: false
  models:
    classification:
      - "random_forest"
      - "logistic"
      - "xgboost"
      # - "lightgbm"
      - "tree"
    regression:
      # - "random_forest"
      - "ridge"
      - "xgboost"
      - "lightgbm"
      # - "tree"

evaluation:
  classification:
    - accuracy
    - precision
    - recall
    - f1
  regression:
    - rmse
    - mae
    - r2